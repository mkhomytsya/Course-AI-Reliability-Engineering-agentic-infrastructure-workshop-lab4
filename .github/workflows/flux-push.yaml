name: Push releases as OCI artifact

on:
  workflow_call:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push OCI artifact
        id: push
        env:
          REPO: ${{ github.repository }}
        run: |
          REPO_LC=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          TAG=${GITHUB_REF_NAME#v}
          digest=$(flux push artifact oci://ghcr.io/${REPO_LC}/releases:${TAG} \
            --path="./releases" \
            --source="${{ github.repositoryUrl }}" \
            --revision="${{ github.ref_name }}@sha1:${{ github.sha }}" \
            --output json | jq -r '.digest')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "digest=${digest}" >> $GITHUB_OUTPUT
          echo "repo=${REPO_LC}" >> $GITHUB_OUTPUT

      - name: Tag artifact
        run: |
          flux tag artifact \
            oci://ghcr.io/${{ steps.push.outputs.repo }}/releases:${{ steps.push.outputs.tag }}@${{ steps.push.outputs.digest }} \
            --tag latest
