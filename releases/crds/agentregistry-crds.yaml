apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agentregistry-inventory
  namespace: flux-system
spec:
  interval: 1h
  url: https://github.com/den-vasyliev/agentregistry-inventory
  ref:
    branch: main
---
apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry-crds
  namespace: agentregistry
spec:
  interval: 1h
  releaseName: agentregistry-crds
  chart:
    spec:
      chart: charts/agentregistry
      sourceRef:
        kind: GitRepository
        name: agentregistry-inventory
        namespace: flux-system
  install:
    createNamespace: true
    crds: CreateReplace
  values:
    replicaCount: 0