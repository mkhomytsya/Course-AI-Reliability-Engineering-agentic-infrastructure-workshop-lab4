apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: coach-agent
  namespace: kagent
spec:
  type: BYO
  description: >-
    AI learning coach for MuckeligAgentLMS.
    Explains concepts, quizzes learners, and tracks progress via the A2A protocol.
  byo:
    deployment:
      image: ghcr.io/${github_owner}/${github_repo}/coach-agent:${coach_agent_version}
      imagePullPolicy: Always
      replicas: 1
      env:
        - name: AGENT_BASE_URL
          value: "http://coach-agent.kagent.svc.cluster.local:8080"
        - name: GITHUB_OWNER
          value: "${github_owner}"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: coach-agent
  namespace: kagent
spec:
  selector:
    app: coach-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: coach-agent
  namespace: kagent
spec:
  parentRefs:
    - name: agentgateway-external
      namespace: agentgateway-system
  hostnames:
    - "coach-agent.abox.local"
  rules:
    # Well-Known URI — agent card discovery (highest priority)
    - matches:
        - path:
            type: PathPrefix
            value: "/.well-known"
      backendRefs:
        - name: coach-agent
          namespace: kagent
          port: 8080
    # A2A JSON-RPC endpoint
    - matches:
        - path:
            type: PathPrefix
            value: "/a2a"
      backendRefs:
        - name: coach-agent
          namespace: kagent
          port: 8080
    # Health + root
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: coach-agent
          namespace: kagent
          port: 8080