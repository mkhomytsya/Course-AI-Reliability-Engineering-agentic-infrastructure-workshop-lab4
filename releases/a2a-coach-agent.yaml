apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: coach-agent
  namespace: kagent
spec:
  type: BYO
  description: >-
    AI learning coach for MuckeligAgentLMS.
    Explains concepts, quizzes learners, and tracks progress via the A2A protocol.
  byo:
    deployment:
      image: ghcr.io/${github_owner}/${github_repo}/coach-agent:${coach_agent_version}
      imagePullPolicy: Always
      replicas: 1
      env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: kagent-openai
              key: OPENAI_API_KEY
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1000m"
          memory: "1Gi"