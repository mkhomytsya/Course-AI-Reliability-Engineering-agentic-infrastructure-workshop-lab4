apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
spec:
  interval: 1h
  releaseName: agentregistry-inventory
  dependsOn:
    - name: agentgateway-crds
      namespace: agentgateway-system
    - name: agentregistry-crds
      namespace: agentregistry
  chart:
    spec:
      chart: charts/agentregistry
      sourceRef:
        kind: GitRepository
        name: agentregistry-inventory
        namespace: flux-system
  install:
    createNamespace: true
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/den-vasyliev/agentregistry-inventory
      tag: "0.5.4"
      pullPolicy: Always
    disableAuth: true
    controller:
      logLevel: info
    httpRoute:
      enabled: true
      gatewayName: agentgateway-external
      gatewayNamespace: agentgateway-system
      sectionName: http

---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentregistry
  to:
    - group: ""
      kind: Service