---
apiVersion: v1
kind: Namespace
metadata:
  name: agentregistry
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
spec:
  interval: 1h
  releaseName: agentregistry-inventory
  dependsOn:
    - name: agentgateway-crds
      namespace: agentgateway-system
    - name: agentregistry-crds
      namespace: agentregistry
  chart:
    spec:
      chart: charts/agentregistry
      sourceRef:
        kind: GitRepository
        name: agentregistry-inventory
        namespace: flux-system
  install:
    createNamespace: true
  values:
    replicaCount: 1
    image:
      repository: ghcr.io/den-vasyliev/agentregistry-inventory
      tag: "0.5.4"
      pullPolicy: Always
    disableAuth: true
    controller:
      logLevel: info
---
# ReferenceGrant — HTTPRoute в agentregistry → Gateway в agentgateway-system
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: agentregistry
  namespace: agentregistry
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentregistry
  to:
    - group: ""
      kind: Service
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agentregistry-inventory
  namespace: agentregistry
spec:
  parentRefs:
    - name: agentgateway-external
      namespace: agentgateway-system
  rules:
    # Web UI
    - matches:
        - path:
            type: PathPrefix
            value: /inventory
      backendRefs:
        - name: agentregistry-inventory
          namespace: agentregistry
          port: 8080
    # MCP server
    - matches:
        - path:
            type: PathPrefix
            value: /inventory/mcp
      backendRefs:
        - name: agentregistry-inventory
          namespace: agentregistry
          port: 8083